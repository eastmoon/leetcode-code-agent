<svg viewBox="0 0 1400 640" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe Print','Comic Sans MS','Marker Felt',cursive">
  <defs>
    <!-- 手繪粗糙效果（僅用於方框） -->
    <filter id="sketchy" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.03" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <marker id="arrow_cyan" markerWidth="14" markerHeight="14" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 L3,5 Z" fill="#4DD9FF"/>
    </marker>
    <marker id="arrow_yellow" markerWidth="14" markerHeight="14" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 L3,5 Z" fill="#FFC857"/>
    </marker>
    <marker id="arrow_green" markerWidth="14" markerHeight="14" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 L3,5 Z" fill="#A3FF6B"/>
    </marker>
    <marker id="arrow_pink" markerWidth="14" markerHeight="14" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 L3,5 Z" fill="#FF6FA5"/>
    </marker>
  </defs>

  <!-- 背景透明 -->

  <!-- 方框: LeetCode Issue（左上） -->
  <g filter="url(#sketchy)">
    <rect x="40" y="30" width="270" height="110" rx="18" ry="18"
          fill="none" stroke="#4DD9FF" stroke-width="4"/>
    <rect x="46" y="36" width="258" height="98" rx="16" ry="16"
          fill="none" stroke="#4DD9FF" stroke-width="1.5" opacity="0.5"/>
  </g>
  <text x="175" y="95" text-anchor="middle" font-size="24" fill="#4DD9FF" font-weight="bold">LeetCode</text>
  <text x="175" y="125" text-anchor="middle" font-size="24" fill="#4DD9FF" font-weight="bold">Issue</text>

  <!-- 方框: PseudoCode Constitution（左下） -->
  <g filter="url(#sketchy)">
    <rect x="40" y="480" width="290" height="110" rx="18" ry="18"
          fill="none" stroke="#FFC857" stroke-width="4"/>
    <rect x="46" y="486" width="278" height="98" rx="16" ry="16"
          fill="none" stroke="#FFC857" stroke-width="1.5" opacity="0.5"/>
  </g>
  <text x="185" y="530" text-anchor="middle" font-size="21" fill="#FFC857" font-weight="bold">PseudoCode</text>
  <text x="185" y="560" text-anchor="middle" font-size="21" fill="#FFC857" font-weight="bold">Constitution</text>

  <!-- 方框: PseudoCode（中間） -->
  <g filter="url(#sketchy)">
    <rect x="530" y="255" width="270" height="110" rx="18" ry="18"
          fill="none" stroke="#A3FF6B" stroke-width="4"/>
    <rect x="536" y="261" width="258" height="98" rx="16" ry="16"
          fill="none" stroke="#A3FF6B" stroke-width="1.5" opacity="0.5"/>
  </g>
  <text x="665" y="320" text-anchor="middle" font-size="24" fill="#A3FF6B" font-weight="bold">PseudoCode</text>

  <!-- 方框: Coding Guideline（右下） -->
  <g filter="url(#sketchy)">
    <rect x="1080" y="480" width="280" height="110" rx="18" ry="18"
          fill="none" stroke="#FF6FA5" stroke-width="4"/>
    <rect x="1086" y="486" width="268" height="98" rx="16" ry="16"
          fill="none" stroke="#FF6FA5" stroke-width="1.5" opacity="0.5"/>
  </g>
  <text x="1220" y="525" text-anchor="middle" font-size="22" fill="#FF6FA5" font-weight="bold">Coding</text>
  <text x="1220" y="555" text-anchor="middle" font-size="22" fill="#FF6FA5" font-weight="bold">Guideline</text>

  <!-- 方框: Program（右） -->
  <g filter="url(#sketchy)">
    <rect x="1080" y="255" width="260" height="110" rx="18" ry="18"
          fill="none" stroke="#B388FF" stroke-width="4"/>
    <rect x="1086" y="261" width="248" height="98" rx="16" ry="16"
          fill="none" stroke="#B388FF" stroke-width="1.5" opacity="0.5"/>
  </g>
  <text x="1210" y="320" text-anchor="middle" font-size="26" fill="#B388FF" font-weight="bold">Program</text>

  <!-- 箭頭 1: LeetCode Issue -> PseudoCode（題目描述） -->
  <path d="M310,120 C400,180 460,230 528,275" fill="none"
        stroke="#4DD9FF" stroke-width="4" marker-end="url(#arrow_cyan)"/>
  <text x="400" y="200" text-anchor="middle" font-size="19" fill="#4DD9FF">題目描述</text>

  <!-- 箭頭 2: PseudoCode Constitution -> PseudoCode（設計原則） -->
  <path d="M330,505 C420,450 470,410 528,345" fill="none"
        stroke="#FFC857" stroke-width="4" marker-end="url(#arrow_yellow)"/>
  <text x="410" y="440" text-anchor="middle" font-size="19" fill="#FFC857">設計原則</text>

  <!-- 箭頭 3: PseudoCode -> Program（邏輯描述） -->
  <path d="M800,310 C900,310 980,310 1078,310" fill="none"
        stroke="#A3FF6B" stroke-width="4" marker-end="url(#arrow_green)"/>
  <text x="940" y="290" text-anchor="middle" font-size="19" fill="#A3FF6B">邏輯描述</text>

  <!-- 箭頭 4: LeetCode Issue -> Program（約束條件） -->
  <path d="M280,32 C600,-40 950,-20 1160,253" fill="none"
        stroke="#4DD9FF" stroke-width="4" marker-end="url(#arrow_cyan)"/>
  <text x="700" y="30" text-anchor="middle" font-size="19" fill="#4DD9FF">約束條件</text>

  <!-- 箭頭 5: Coding Guideline -> Program（約束條件） -->
  <path d="M1230,478 C1235,440 1225,400 1215,367" fill="none"
        stroke="#FF6FA5" stroke-width="4" marker-end="url(#arrow_pink)"/>
  <text x="1300" y="430" text-anchor="middle" font-size="19" fill="#FF6FA5">約束條件</text>

</svg>
