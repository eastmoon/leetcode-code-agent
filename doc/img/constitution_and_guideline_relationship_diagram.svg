<svg viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe Print','Comic Sans MS','Marker Felt',cursive">
  <defs>
    <!-- 手繪粗糙效果 -->
    <filter id="sketchy" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.02 0.03" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="sketchy2" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.03 0.05" numOctaves="2" seed="3" result="noise2"/>
      <feDisplacementMap in="SourceGraphic" in2="noise2" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <marker id="arrowhead1" markerWidth="14" markerHeight="14" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 L3,5 Z" fill="#4DD9FF"/>
    </marker>
    <marker id="arrowhead2" markerWidth="14" markerHeight="14" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 L3,5 Z" fill="#FF6FA5"/>
    </marker>
  </defs>

  <!-- 背景透明，不需畫矩形 -->

  <!-- 方框 1: LLM & Principle -->
  <g filter="url(#sketchy)">
    <rect x="40" y="150" width="260" height="120" rx="18" ry="18"
          fill="none" stroke="#4DD9FF" stroke-width="4"/>
    <rect x="46" y="156" width="248" height="108" rx="16" ry="16"
          fill="none" stroke="#4DD9FF" stroke-width="1.5" opacity="0.5"/>
  </g>
  <text x="170" y="205" text-anchor="middle" font-size="26" fill="#4DD9FF" font-weight="bold">LLM &amp;</text>
  <text x="170" y="240" text-anchor="middle" font-size="26" fill="#4DD9FF" font-weight="bold">Principle</text>

  <!-- 方框 2: Constitution & Program Language -->
  <g filter="url(#sketchy)">
    <rect x="470" y="130" width="300" height="160" rx="18" ry="18"
          fill="none" stroke="#FFC857" stroke-width="4"/>
    <rect x="476" y="136" width="288" height="148" rx="16" ry="16"
          fill="none" stroke="#FFC857" stroke-width="1.5" opacity="0.5"/>
  </g>
  <text x="620" y="195" text-anchor="middle" font-size="24" fill="#FFC857" font-weight="bold">Constitution</text>
  <text x="620" y="230" text-anchor="middle" font-size="24" fill="#FFC857" font-weight="bold">&amp;</text>
  <text x="620" y="265" text-anchor="middle" font-size="24" fill="#FFC857" font-weight="bold">Program Language</text>

  <!-- 方框 3: Coding Guideline -->
  <g filter="url(#sketchy)">
    <rect x="940" y="150" width="230" height="120" rx="18" ry="18"
          fill="none" stroke="#FF6FA5" stroke-width="4"/>
    <rect x="946" y="156" width="218" height="108" rx="16" ry="16"
          fill="none" stroke="#FF6FA5" stroke-width="1.5" opacity="0.5"/>
  </g>
  <text x="1055" y="220" text-anchor="middle" font-size="24" fill="#FF6FA5" font-weight="bold">Coding</text>
  <text x="1055" y="255" text-anchor="middle" font-size="24" fill="#FF6FA5" font-weight="bold">Guideline</text>

  <!-- 箭頭 1: LLM & Principle -> Constitution -->
  <path d="M300,210 C360,200 400,220 465,210" fill="none"
        stroke="#4DD9FF" stroke-width="6" marker-end="url(#arrowhead1)"/>
  <text x="382" y="180" text-anchor="middle" font-size="20" fill="#4DD9FF">解釋內容</text>

  <!-- 箭頭 2: Constitution -> Coding Guideline -->
  <path d="M770,210 C840,200 880,220 935,210" fill="none"
        stroke="#FF6FA5" stroke-width="6" marker-end="url(#arrowhead2)"/>
  <text x="850" y="180" text-anchor="middle" font-size="18" fill="#FF6FA5">基於憲章撰寫細則</text>
</svg>
